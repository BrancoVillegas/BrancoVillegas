name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake Game from GitHub Contribution Grid
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: BrancoVillegas
          outputs: |
            dist/github-snake.svg?color_snake=green&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
            dist/github-snake-dark.svg?color_snake=#39d353&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
